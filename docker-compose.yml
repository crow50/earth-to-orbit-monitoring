services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rl}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rlpass}
      POSTGRES_DB: ${POSTGRES_DB:-rocket_launch}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - rlnet

  api:
    build: ./services/api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-rl}:${POSTGRES_PASSWORD:-rlpass}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-rocket_launch}
    depends_on:
      - db
    networks:
      - rlnet

  frontend:
    build:
      context: ./frontend
      args:
        # Build-time base path so the app can live under /e2o/ behind the IDX gateway.
        # Override if you want to run it at the root path.
        VITE_BASE_PATH: ${VITE_BASE_PATH:-/e2o/}
    depends_on:
      - api
    networks:
      rlnet: {}
      oc-mesh:
        aliases:
          - e2o-frontend

  ingest:
    build: ./services/ingest
    environment:
      PYTHONUNBUFFERED: 1
      POLL_INTERVAL_SECONDS: 3600
      DATABASE_URL: postgres://${POSTGRES_USER:-rl}:${POSTGRES_PASSWORD:-rlpass}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-rocket_launch}
      # Configurable LL2 endpoint/mode (avoid hardcoding dev endpoints in code)
      LL_API_URL: ${LL_API_URL:-https://lldev.thespacedevs.com/2.3.0/launches/}
      LL_API_MODE: ${LL_API_MODE:-detailed}
      # Dev controls (bounded ingest + provider prioritization)
      LL_LSP_NAME: ${LL_LSP_NAME:-}
      LL_LIMIT: ${LL_LIMIT:-20}
      LL_PAGES_TO_FETCH: ${LL_PAGES_TO_FETCH:-2}
    depends_on:
      - db
    networks:
      - rlnet

  db-migrate:
    build:
      context: .
      dockerfile: services/db-migrate/Dockerfile
    environment:
      # Schema owner remains services/poller; this service just runs the migrations.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rl}:${POSTGRES_PASSWORD:-rlpass}@db:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-rocket_launch}
    depends_on:
      - db
    networks:
      - rlnet

volumes:
  db-data:

networks:
  rlnet:
    driver: bridge
  oc-mesh:
    external: true
