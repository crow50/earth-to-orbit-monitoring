name: CI

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:

jobs:
  api-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install API deps
        run: |
          cd services/api
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import smoke (FastAPI app)
        run: |
          cd services/api
          python -c "import app.main as m; print('import OK')"

  ingest-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install ingest deps (if present)
        run: |
          if [ -f services/ingest/requirements.txt ]; then
            cd services/ingest
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No services/ingest/requirements.txt — skipping dependency install"
          fi
      - name: Import smoke (ingest)
        run: |
          if [ -d services/ingest ]; then
            python -m compileall services/ingest
          else
            echo "No ingest service directory — skipping"
          fi

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package.json
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build

  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker images (compose)
        run: docker compose -f docker-compose.yml build

  build-and-push:
    runs-on: ubuntu-latest
    needs: [api-smoke, ingest-smoke, frontend-build, compose-build]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push api image
        uses: docker/build-push-action@v6
        with:
          context: ./services/api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/earth-to-orbit-monitoring-api:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/earth-to-orbit-monitoring-frontend:${{ github.sha }}
